<link rel="icon" href="{{ site.relativepath }}/favicon.ico" type="image/x-icon">

{% assign color_theme = site.color_theme %}
{% assign img_all_show = site.img_all_show %}

<style>
  * {
    font-family: "Microsoft YaHei", "微软雅黑", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  /* 淡色主题映射 */
  {% if color_theme == 'blue' %}
    {% assign light_color = 'rgba(173, 216, 230, 0.5)' %}
    {% assign dark_color = '#1e90ff' %}
  {% elsif color_theme == 'green' %}
    {% assign light_color = 'rgba(144, 238, 144, 0.5)' %}
    {% assign dark_color = '#32cd32' %}
  {% elsif color_theme == 'red' %}
    {% assign light_color = 'rgba(255, 192, 192, 0.5)' %}
    {% assign dark_color = '#ff4500' %}
  {% else %}
    {% assign light_color = 'rgba(200, 200, 200, 0.5)' %}
    {% assign dark_color = '#666' %}
  {% endif %}

  /* 头部图片容器 */
  .header-image-wrapper {
    width: 100%;
    background-color: {{ light_color }};
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* 使用宽高比 16:3 */
  .header-image-container {
    width: 100%;
    aspect-ratio: 16 / 3;
    position: relative;
    overflow: hidden;
  }

  .header-image {
    width: 100%;
    height: 100%;
    object-fit: {% if img_all_show == true %}contain{% else %}cover{% endif %};
    object-position: center;
    display: block;
  }

  .header-text-overlay {
    text-align: center;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    z-index: 10;
  }

  .header-text-overlay h1 {
    margin: 0;
    font-size: 48px;
    font-weight: bold;
    line-height: 1.2;
  }

  .header-text-overlay p {
    margin: 10px 0 0 0;
    font-size: 18px;
    opacity: 0.95;
  }

  /* 导航栏 */
  .navbar {
    width: 100%;
    height: 40pt;
    background-color: {{ dark_color }};
    display: flex;
    align-items: center;
    box-sizing: border-box;
    padding: 0 20px;    
    position: sticky;
    top: 0;
    z-index: 1000;  }

  .navbar a {
    font-size: 20pt;
    color: rgb(157, 58, 182);
    text-decoration: none;
    white-space: nowrap;
    transition: opacity 0.3s ease;
  }

  .navbar a:hover {
    opacity: 0.8;
  }

  /* 防止整个页面有边距 */
  body {
    margin: 0;
    padding: 0;
  }
</style>

<!-- 头部背景图片 -->
<div class="header-image-wrapper">
  <div class="header-image-container">
    <img src="{{ site.relativepath }}/img/headerimg.png" alt="Header Image" class="header-image" />
    <div class="header-text-overlay">
      <h1>{{ site.title }}</h1>
      <p>{{ site.description }}</p>
    </div>
  </div>
</div>

<!-- 导航栏 -->
<nav class="navbar">
  <a href="{{ site.relativepath }}/">首页</a>
</nav>
